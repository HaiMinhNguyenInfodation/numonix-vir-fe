<div class="dashboard-container">
    <h1 class="page-title">Dashboard</h1>

    <div class="cards-grid">
        <mat-card class="summary-card">
            <mat-card-header>
                <mat-icon mat-card-avatar color="primary">bar_chart</mat-icon>
                <mat-card-title>Reports</mat-card-title>
                <mat-card-subtitle>View your reports</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p>Access native and embedded reports here.</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" [routerLink]="['/app/reports/view']">
                    Open Reports
                </button>
            </mat-card-actions>
        </mat-card>

        <mat-card class="summary-card">
            <mat-card-header>
                <mat-icon mat-card-avatar>info</mat-icon>
                <mat-card-title>Welcome</mat-card-title>
                <mat-card-subtitle>Numonix Reporting Portal</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p>This is your reporting dashboard. More features coming in Phase 2.</p>
            </mat-card-content>
        </mat-card>
    </div>
</div>
